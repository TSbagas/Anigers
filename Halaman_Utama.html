<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeVerse | Streaming & Community</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <style>
      /* --- CSS STYLING (Tetap Sesuai Request) --- */
      :root {
        --primary: #8a2be2;
        --secondary: #4b0082;
        --dark: #0f0f1a;
        --card-bg: #1a1a2e;
        --text: #ffffff;
        --glass: rgba(255, 255, 255, 0.05);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }
      body {
        background-color: var(--dark);
        color: var(--text);
        overflow-x: hidden;
      }

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 8%;
        background: rgba(15, 15, 26, 0.95);
        backdrop-filter: blur(10px);
        position: sticky;
        top: 0;
        z-index: 1000;
        border-bottom: 1px solid var(--glass);
      }

      .logo {
        font-size: 24px;
        font-weight: 600;
        cursor: pointer;
      }
      .logo span {
        color: var(--primary);
      }

      .nav-links {
        display: flex;
        gap: 25px;
        list-style: none;
      }
      .nav-links a {
        text-decoration: none;
        color: #ccc;
        transition: 0.3s;
        font-size: 14px;
        cursor: pointer;
      }
      .nav-links a:hover,
      .nav-links a.active {
        color: var(--primary);
      }

      .search-bar input {
        padding: 8px 18px;
        border-radius: 20px;
        border: 1px solid var(--glass);
        background: #252545;
        color: white;
        outline: none;
      }

      .hero {
        height: 500px;
        background:
          linear-gradient(to right, rgba(15, 15, 26, 1), rgba(15, 15, 26, 0.2)),
          url("https://images.alphacoders.com/131/1310162.jpeg");
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        padding: 0 8%;
      }

      .hero-content h1 {
        font-size: 50px;
        line-height: 1.2;
        margin-bottom: 15px;
      }
      .hero-content p {
        color: #ccc;
        max-width: 500px;
        margin-bottom: 25px;
      }

      .btn-watch {
        padding: 12px 35px;
        background: var(--primary);
        border: none;
        color: white;
        border-radius: 30px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
        box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4);
      }
      .btn-watch:hover {
        background: var(--secondary);
        transform: translateY(-3px);
      }

      .container {
        padding: 50px 8%;
      }
      .section-title {
        margin-bottom: 30px;
        border-left: 5px solid var(--primary);
        padding-left: 15px;
        font-size: 24px;
      }

      .anime-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 25px;
      }

      .anime-card {
        background: var(--card-bg);
        border-radius: 15px;
        overflow: hidden;
        transition: 0.4s;
        border: 1px solid var(--glass);
      }
      .anime-card:hover {
        transform: scale(1.05);
        border-color: var(--primary);
      }
      .anime-card img {
        width: 100%;
        height: 280px;
        object-fit: cover;
      }
      .card-info {
        padding: 15px;
      }
      .card-info h3 {
        font-size: 15px;
        margin-bottom: 5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-info span {
        font-size: 12px;
        color: #8a2be2;
        font-weight: bold;
      }

      /* Chat UI */
      .chat-launcher {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 65px;
        height: 65px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 26px;
        cursor: pointer;
        z-index: 1001;
        transition: 0.4s;
      }
      .chat-window {
        position: fixed;
        bottom: 110px;
        right: 30px;
        width: 350px;
        height: 480px;
        background: #16162a;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        z-index: 1000;
        border: 1px solid var(--glass);
        transition: 0.3s ease;
        transform-origin: bottom right;
      }
      .chat-window.hidden {
        opacity: 0;
        transform: scale(0.5) translateY(100px);
        pointer-events: none;
      }
      .chat-header {
        padding: 20px;
        background: #1f1f3d;
        display: flex;
        justify-content: space-between;
        border-radius: 20px 20px 0 0;
      }
      .chat-body {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .message {
        font-size: 13px;
        background: var(--glass);
        padding: 10px;
        border-radius: 10px;
        max-width: 80%;
      }
      .username {
        display: block;
        font-weight: bold;
        color: var(--primary);
        font-size: 11px;
      }
      .chat-footer {
        padding: 15px;
        display: flex;
        gap: 10px;
        background: #1f1f3d;
        border-radius: 0 0 20px 20px;
      }
      .chat-footer input {
        flex: 1;
        background: #252545;
        border: none;
        padding: 12px;
        border-radius: 10px;
        color: white;
        outline: none;
      }
      .chat-footer button {
        background: var(--primary);
        border: none;
        color: white;
        width: 45px;
        border-radius: 10px;
        cursor: pointer;
      }

      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--primary);
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo" onclick="fetchAnime('TRENDING_DESC', 'Sedang Tren')">
        Anime<span>Verse</span>
      </div>
      <ul class="nav-links">
        <li>
          <a onclick="fetchAnime('TRENDING_DESC', 'Beranda')"
            ><i class="fas fa-home"></i> Home</a
          >
        </li>
        <li>
          <a onclick="fetchAnime('POPULARITY_DESC', 'Paling Populer')"
            ><i class="fas fa-fire"></i> Populer</a
          >
        </li>
        <li>
          <a onclick="fetchSchedule()"
            ><i class="fas fa-calendar-alt"></i> Jadwal</a
          >
        </li>
      </ul>
      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="Cari anime..."
          onkeypress="handleSearch(event)"
        />
      </div>
    </nav>

    <header class="hero">
      <div class="hero-content">
        <h1 id="hero-title">Solo Leveling: <br />Ragnarok</h1>
        <p id="hero-desc">
          Dunia telah berubah, dan level harus terus ditingkatkan. Saksikan
          kembalinya sang Hunter terkuat di musim terbaru.
        </p>
        <button class="btn-watch">
          <i class="fas fa-play"></i> Mulai Menonton
        </button>
      </div>
    </header>

    <main class="container">
      <h2 class="section-title" id="content-title">Sedang Tren di AniList</h2>
      <div class="anime-grid" id="anime-list">
        <p>Memuat anime...</p>
      </div>
    </main>

    <div id="chat-launcher" class="chat-launcher" onclick="toggleChat()">
      <i class="fas fa-comment-dots"></i>
    </div>
    <div id="chat-window" class="chat-window hidden">
      <div class="chat-header">
        <div class="online-status">
          <div
            class="dot"
            style="
              width: 8px;
              height: 8px;
              background: #00ff88;
              border-radius: 50%;
            "
          ></div>
          <span>Global Chat</span>
        </div>
        <i
          class="fas fa-times"
          onclick="toggleChat()"
          style="cursor: pointer"
        ></i>
      </div>
      <div class="chat-body" id="chat-messages">
        <div class="message">
          <span class="username">SYSTEM</span>Selamat datang di komunitas
          AnimeVerse!
        </div>
      </div>
      <div class="chat-footer">
        <input type="text" id="chat-input" placeholder="Ketik pesan..." />
        <button onclick="sendMessage()">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>

    <script>
      const API_URL = "https://graphql.anilist.co";

      // Fungsi Ambil Data Umum (Home & Populer)
      async function fetchAnime(sortType, title) {
        document.getElementById("content-title").innerText = title;
        const query = `
          query ($sort: [MediaSort]) {
            Page(perPage: 12) {
              media(type: ANIME, sort: $sort) {
                id
                title { romaji }
                coverImage { large }
                nextAiringEpisode { episode }
                status
              }
            }
          }`;

        const variables = { sort: [sortType] };
        await callAniList(query, variables);
      }

      // Fungsi Search
      async function handleSearch(e) {
        if (e.key === "Enter") {
          const keyword = e.target.value;
          document.getElementById("content-title").innerText =
            `Hasil pencarian: ${keyword}`;
          const query = `
            query ($search: String) {
              Page(perPage: 12) {
                media(type: ANIME, search: $search) {
                  id
                  title { romaji }
                  coverImage { large }
                  status
                }
              }
            }`;
          const variables = { search: keyword };
          await callAniList(query, variables);
        }
      }

      // Fungsi Jadwal (Airing Today)
      async function fetchSchedule() {
        document.getElementById("content-title").innerText =
          "Jadwal Rilis Hari Ini";
        const query = `
          query {
            Page(perPage: 12) {
              airingSchedules(airingAt_greater: ${Math.floor(Date.now() / 1000)}, sort: TIME) {
                media {
                  title { romaji }
                  coverImage { large }
                }
                episode
              }
            }
          }`;

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query }),
          });
          const json = await response.json();
          const list = json.data.Page.airingSchedules.map((item) => ({
            ...item.media,
            nextAiringEpisode: { episode: item.episode },
          }));
          displayAnime(list);
        } catch (err) {
          console.error(err);
        }
      }

      // Helper Call API
      async function callAniList(query, variables) {
        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, variables }),
          });
          const json = await response.json();
          displayAnime(json.data.Page.media);
        } catch (err) {
          document.getElementById("anime-list").innerHTML =
            "<p>Gagal memuat data.</p>";
        }
      }

      function displayAnime(animeList) {
        const container = document.getElementById("anime-list");
        container.innerHTML = "";
        animeList.forEach((anime) => {
          const info = anime.nextAiringEpisode
            ? `Eps ${anime.nextAiringEpisode.episode}`
            : anime.status || "";
          container.innerHTML += `
            <div class="anime-card">
              <img src="${anime.coverImage.large}" alt="cover">
              <div class="card-info">
                <h3>${anime.title.romaji}</h3>
                <span>${info}</span>
              </div>
            </div>`;
        });
      }

      // Chat Functions
      function toggleChat() {
        const win = document.getElementById("chat-window");
        const launch = document.getElementById("chat-launcher");
        win.classList.toggle("hidden");
        launch.style.opacity = win.classList.contains("hidden") ? "1" : "0";
      }

      function sendMessage() {
        const input = document.getElementById("chat-input");
        if (input.value.trim()) {
          const body = document.getElementById("chat-messages");
          body.innerHTML += `<div class="message"><span class="username">Kamu</span>${input.value}</div>`;
          input.value = "";
          body.scrollTop = body.scrollHeight;
        }
      }

      // Load Default
      window.onload = () =>
        fetchAnime("TRENDING_DESC", "Sedang Tren di AniList");
    </script>
  </body>
</html>
