<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aniger - Streaming Anime</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css"
    />
    <style>
      :root {
        --primary: #8a2be2;
        --secondary: #4b0082;
        --dark: #0a0a12;
        --card-bg: #16162a;
        --text: #ffffff;
        --glass: rgba(255, 255, 255, 0.05);
        --glass-heavy: rgba(255, 255, 255, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", "Segoe UI", sans-serif;
      }
      body {
        background-color: var(--dark);
        color: var(--text);
        overflow-x: hidden;
        line-height: 1.6;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--dark);
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--primary);
      }

      /* Navbar */
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 5%;
        background: rgba(10, 10, 18, 0.9);
        backdrop-filter: blur(15px);
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 1000;
        border-bottom: 1px solid var(--glass);
      }
      .logo {
        font-size: 26px;
        font-weight: 800;
        color: white;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .logo span {
        color: var(--primary);
      }
      .nav-links {
        display: flex;
        list-style: none;
        gap: 30px;
      }
      .nav-item {
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
        color: #999;
        font-size: 14px;
      }
      .nav-item:hover,
      .nav-item.active {
        color: var(--primary);
      }

      .search-box {
        background: var(--glass);
        border: 1px solid var(--glass-heavy);
        padding: 8px 18px;
        border-radius: 25px;
        display: flex;
        align-items: center;
      }
      .search-box input {
        background: none;
        border: none;
        color: white;
        outline: none;
        margin-left: 10px;
        width: 180px;
      }

      /* Container */
      .container {
        padding: 100px 5% 50px;
        min-height: 100vh;
      }
      .page {
        display: none;
        animation: fadeIn 0.5s ease;
      }
      .page.active {
        display: block;
      }

      /* Hero Slider Premium */
      #hero-slider {
        height: 500px;
        border-radius: 25px;
        overflow: hidden;
        position: relative;
        margin-bottom: 50px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      }
      .slide {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        display: none;
        align-items: center;
        padding: 0 8%;
      }
      .slide.active {
        display: flex;
      }
      .slide::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to right,
          rgba(10, 10, 18, 1) 15%,
          rgba(10, 10, 18, 0.3) 60%,
          rgba(10, 10, 18, 0.8)
        );
      }

      .hero-content {
        position: relative;
        max-width: 650px;
        z-index: 2;
      }
      .hero-content h1 {
        font-size: 52px;
        font-weight: 900;
        margin-bottom: 10px;
        text-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
        line-height: 1.1;
      }
      .hero-content p {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 25px;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .btn-play {
        background: var(--primary);
        color: white;
        border: none;
        padding: 15px 35px;
        border-radius: 50px;
        cursor: pointer;
        font-weight: 800;
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        transition: 0.4s;
        box-shadow: 0 8px 20px rgba(138, 43, 226, 0.4);
        text-transform: uppercase;
      }
      .btn-play:hover {
        transform: translateY(-3px) scale(1.05);
        background: #a04ef5;
        box-shadow: 0 12px 25px rgba(138, 43, 226, 0.5);
      }

      /* Anime Cards */
      .anime-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 25px;
      }
      .anime-card {
        cursor: pointer;
        transition: 0.4s ease;
      }
      .anime-card:hover {
        transform: translateY(-10px);
      }
      .card-image-wrapper {
        position: relative;
        width: 100%;
        aspect-ratio: 2/3;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      }
      .card-image-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .badge-hot {
        position: absolute;
        top: 10px;
        left: 10px;
        background: #ff3e3e;
        color: white;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 800;
      }
      .badge-rating {
        position: absolute;
        top: 40px;
        left: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: #ffc107;
        padding: 3px 8px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: bold;
      }
      .ep-overlay {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(20, 20, 35, 0.9);
        backdrop-filter: blur(8px);
        color: white;
        padding: 7px 0;
        border-radius: 10px;
        width: 85%;
        text-align: center;
        font-weight: 700;
        font-size: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .card-info h3 {
        font-size: 14px;
        padding: 12px 5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Global Chat */
      #chat-container {
        position: fixed;
        right: -320px;
        bottom: 0;
        width: 320px;
        height: 100vh;
        background: var(--card-bg);
        border-left: 1px solid var(--glass-heavy);
        z-index: 2000;
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
      }
      #chat-container.open {
        right: 0;
      }
      .chat-toggle {
        position: absolute;
        left: -50px;
        bottom: 20px;
        width: 50px;
        height: 50px;
        background: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 15px 0 0 15px;
        cursor: pointer;
        color: white;
      }
      .chat-header {
        padding: 20px;
        border-bottom: 1px solid var(--glass);
        font-weight: 800;
      }
      #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .msg {
        background: var(--glass);
        padding: 10px;
        border-radius: 12px;
        font-size: 13px;
      }
      .msg b {
        color: var(--primary);
        display: block;
        font-size: 11px;
      }
      .chat-input {
        padding: 15px;
        display: flex;
        gap: 8px;
        background: rgba(0, 0, 0, 0.2);
      }
      .chat-input input {
        flex: 1;
        background: var(--glass);
        border: 1px solid var(--glass-heavy);
        border-radius: 8px;
        padding: 10px;
        color: white;
        outline: none;
      }
      .chat-input button {
        background: var(--primary);
        border: none;
        width: 40px;
        border-radius: 8px;
        color: white;
        cursor: pointer;
      }

      /* Detail Page */
      .player-grid {
        display: grid;
        grid-template-columns: 2.5fr 1fr;
        gap: 30px;
      }
      .video-wrapper {
        width: 100%;
        aspect-ratio: 16/9;
        background: black;
        border-radius: 20px;
        overflow: hidden;
      }
      .video-wrapper iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .info-box {
        background: var(--glass);
        padding: 20px;
        border-radius: 20px;
        margin-top: 20px;
        border: 1px solid var(--glass-heavy);
      }
      .ep-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 15px;
        max-height: 400px;
        overflow-y: auto;
      }
      .ep-item {
        background: var(--glass);
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        justify-content: space-between;
      }
      .ep-item:hover {
        background: var(--primary);
      }

      .sec-title {
        margin: 40px 0 25px;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .sec-title span {
        width: 5px;
        height: 25px;
        background: var(--primary);
        border-radius: 10px;
      }

      #loader {
        position: fixed;
        inset: 0;
        background: var(--dark);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid var(--glass);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 1s infinite linear;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @media (max-width: 900px) {
        .player-grid {
          grid-template-columns: 1fr;
        }
        #chat-container {
          width: 100%;
          right: -100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="loader"><div class="spinner"></div></div>

    <nav>
      <div class="logo" onclick="initHome()">Ani<span>ger</span></div>
      <ul class="nav-links">
        <li id="m-home" class="nav-item active" onclick="initHome()">Home</li>
        <li
          id="m-pop"
          class="nav-item"
          onclick="loadCategory('POPULARITY_DESC', 'Populer')"
        >
          Populer
        </li>
        <li id="m-jad" class="nav-item" onclick="loadSchedule()">Jadwal</li>
      </ul>
      <div class="search-box">
        <i class="fas fa-search" style="color: #666"></i>
        <input
          type="text"
          placeholder="Cari anime..."
          onkeypress="handleSearch(event)"
        />
      </div>
    </nav>

    <div class="container">
      <div id="home-page" class="page active">
        <div id="hero-slider"></div>
        <h2 class="sec-title"><span></span>UPDATE EPISODE</h2>
        <div id="trending-list" class="anime-grid"></div>
      </div>

      <div id="category-page" class="page">
        <h2 id="category-title" class="sec-title"><span></span>Kategori</h2>
        <div id="category-list" class="anime-grid"></div>
      </div>

      <div id="detail-page" class="page">
        <button
          onclick="showPage('home-page')"
          style="
            background: var(--glass);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
          "
        >
          <i class="fas fa-arrow-left"></i> Kembali
        </button>
        <div id="detail-content"></div>
        <h2 class="sec-title"><span></span>ANIME SERUPA</h2>
        <div id="recommendation-list" class="anime-grid"></div>
      </div>
    </div>

    <div id="chat-container">
      <div
        class="chat-toggle"
        onclick="
          document.getElementById('chat-container').classList.toggle('open')
        "
      >
        <i class="fas fa-comments"></i>
      </div>
      <div class="chat-header">CHAT GLOBAL</div>
      <div id="chat-messages">
        <div class="msg"><b>Sistem</b>Selamat datang di Aniger!</div>
      </div>
      <div class="chat-input">
        <input
          type="text"
          id="msgInput"
          placeholder="Ketik pesan..."
          onkeypress="if (event.key == 'Enter') sendChat();"
        />
        <button onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>

    <script>
      const API_URL = "https://graphql.anilist.co";

      function showPage(p) {
        document
          .querySelectorAll(".page")
          .forEach((x) => x.classList.remove("active"));
        document.getElementById(p).classList.add("active");
        window.scrollTo({ top: 0, behavior: "smooth" });
        document
          .querySelectorAll(".nav-item")
          .forEach((n) => n.classList.remove("active"));
        if (p === "home-page")
          document.getElementById("m-home").classList.add("active");
      }

      function toggleLoader(s) {
        document.getElementById("loader").style.display = s ? "flex" : "none";
      }

      async function translateText(t) {
        if (!t) return "Sinopsis tidak tersedia.";
        try {
          const r = await fetch(
            `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=id&dt=t&q=${encodeURI(t.replace(/<\/?[^>]+(>|$)/g, ""))}`,
          );
          const j = await r.json();
          return j[0].map((x) => x[0]).join("");
        } catch (e) {
          return t;
        }
      }

      async function initHome() {
        toggleLoader(true);
        showPage("home-page");
        const q = `query { 
                slider: Page(perPage: 5) { media(type: ANIME, sort: TRENDING_DESC) { id title { romaji } description bannerImage coverImage { extraLarge } } }
                recent: Page(perPage: 12) { airingSchedules(airingAt_lesser: ${Math.floor(Date.now() / 1000)}, sort: TIME_DESC) { episode media { id title { romaji } averageScore coverImage { large } } } }
            }`;
        try {
          const r = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: q }),
          });
          const j = await r.json();
          const d = j.data;

          document.getElementById("hero-slider").innerHTML = d.slider.media
            .map(
              (a, i) => `
                    <div class="slide ${i === 0 ? "active" : ""}" style="background-image: url('${a.bannerImage || a.coverImage.extraLarge}')">
                        <div class="hero-content">
                            <h1>${a.title.romaji}</h1>
                            <p>${a.description ? a.description.replace(/<\/?[^>]+(>|$)/g, "") : "Tonton anime seru ini sekarang di Aniger."}</p>
                            <button class="btn-play" onclick="loadDetail(${a.id})"><i class="fas fa-play-circle"></i> MULAI NONTON</button>
                        </div>
                    </div>
                `,
            )
            .join("");

          document.getElementById("trending-list").innerHTML =
            d.recent.airingSchedules
              .map(
                (i) => `
                    <div class="anime-card" onclick="loadDetail(${i.media.id})">
                        <div class="card-image-wrapper">
                            <img src="${i.media.coverImage.large}">
                            <div class="badge-hot">HOT</div>
                            <div class="badge-rating"><i class="fas fa-star"></i> ${(i.media.averageScore / 10).toFixed(1)}</div>
                            <div class="ep-overlay">Eps. ${i.episode}</div>
                        </div>
                        <div class="card-info"><h3>${i.media.title.romaji}</h3></div>
                    </div>
                `,
              )
              .join("");
          startAutoSlide();
        } catch (e) {
          console.error(e);
        } finally {
          toggleLoader(false);
        }
      }

      async function loadDetail(id) {
        toggleLoader(true);
        const q = `query($id:Int){ Media(id:$id){ id title{romaji} description genres episodes averageScore recommendations(perPage:6){ nodes{ mediaRecommendation{ id title{romaji} averageScore coverImage{large} } } } } }`;
        try {
          const r = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: q, variables: { id } }),
          });
          const j = await r.json();
          const a = j.data.Media;
          const sinopsis = await translateText(a.description);

          document.getElementById("detail-content").innerHTML = `
                    <div class="player-grid">
                        <div>
                            <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe></div>
                            <div class="info-box">
                                <h1>${a.title.romaji}</h1>
                                <div style="margin:10px 0; display:flex; gap:10px;">
                                    ${a.genres
                                      .slice(0, 3)
                                      .map(
                                        (g) =>
                                          `<span style="background:var(--primary); font-size:11px; padding:3px 12px; border-radius:20px;">${g}</span>`,
                                      )
                                      .join("")}
                                </div>
                                <p style="color:#bbb; font-size:14px; margin-top:15px;">${sinopsis}</p>
                            </div>
                        </div>
                        <div class="info-box" style="margin-top:0">
                            <h3>Episode</h3>
                            <div class="ep-list">${Array.from({ length: a.episodes || 12 }, (_, i) => `<div class="ep-item">Eps ${i + 1} <i class="fas fa-play"></i></div>`).join("")}</div>
                        </div>
                    </div>
                `;

          document.getElementById("recommendation-list").innerHTML =
            a.recommendations.nodes
              .map((n) => {
                const rec = n.mediaRecommendation;
                if (!rec) return "";
                return `
                        <div class="anime-card" onclick="loadDetail(${rec.id})">
                            <div class="card-image-wrapper">
                                <img src="${rec.coverImage.large}">
                                <div class="badge-rating"><i class="fas fa-star"></i> ${(rec.averageScore / 10).toFixed(1)}</div>
                            </div>
                            <div class="card-info"><h3>${rec.title.romaji}</h3></div>
                        </div>
                    `;
              })
              .join("");

          showPage("detail-page");
        } catch (e) {
          console.error(e);
        } finally {
          toggleLoader(false);
        }
      }

      async function loadCategory(s, t) {
        toggleLoader(true);
        const q = `query($s:[MediaSort]){ Page(perPage:18){ media(type:ANIME, sort:$s){ id title{romaji} averageScore coverImage{large} } } }`;
        try {
          const r = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: q, variables: { s: [s] } }),
          });
          const j = await r.json();
          renderList(t, j.data.Page.media);
          if (t === "Populer")
            document.getElementById("m-pop").classList.add("active");
        } catch (e) {
          console.error(e);
        } finally {
          toggleLoader(false);
        }
      }

      async function loadSchedule() {
        toggleLoader(true);
        const q = `query{ Page(perPage:18){ airingSchedules(airingAt_greater:${Math.floor(Date.now() / 1000)}, sort:TIME){ media{ id title{romaji} averageScore coverImage{large} } episode } } }`;
        try {
          const r = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: q }),
          });
          const j = await r.json();
          renderList(
            "Jadwal Rilis",
            j.data.Page.airingSchedules.map((x) => ({
              ...x.media,
              episode: x.episode,
            })),
          );
          document.getElementById("m-jad").classList.add("active");
        } catch (e) {
          console.error(e);
        } finally {
          toggleLoader(false);
        }
      }

      function renderList(t, d) {
        document.getElementById("category-title").innerText = t;
        document.getElementById("category-list").innerHTML = d
          .map(
            (a) => `
                <div class="anime-card" onclick="loadDetail(${a.id})">
                    <div class="card-image-wrapper">
                        <img src="${a.coverImage.large}">
                        <div class="badge-rating"><i class="fas fa-star"></i> ${(a.averageScore / 10).toFixed(1)}</div>
                        ${a.episode ? `<div class="ep-overlay">Eps. ${a.episode}</div>` : ""}
                    </div>
                    <div class="card-info"><h3>${a.title.romaji}</h3></div>
                </div>
            `,
          )
          .join("");
        showPage("category-page");
      }

      async function handleSearch(e) {
        if (e.key === "Enter" && e.target.value.trim() !== "") {
          toggleLoader(true);
          const q = `query($s:String){ Page(perPage:18){ media(search:$s, type:ANIME){ id title{romaji} averageScore coverImage{large} } } }`;
          try {
            const r = await fetch(API_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                query: q,
                variables: { s: e.target.value },
              }),
            });
            const j = await r.json();
            renderList(`Hasil: ${e.target.value}`, j.data.Page.media);
          } catch (e) {
            console.error(e);
          } finally {
            toggleLoader(false);
          }
        }
      }

      function sendChat() {
        const input = document.getElementById("msgInput");
        if (input.value.trim() !== "") {
          const chatBox = document.getElementById("chat-messages");
          const div = document.createElement("div");
          div.className = "msg";
          div.innerHTML = `<b>User_${Math.floor(Math.random() * 999)}</b>${input.value}`;
          chatBox.appendChild(div);
          input.value = "";
          chatBox.scrollTop = chatBox.scrollHeight;
        }
      }

      let slideIdx = 0,
        slideTimer;
      function startAutoSlide() {
        if (slideTimer) clearInterval(slideTimer);
        slideTimer = setInterval(() => {
          const s = document.querySelectorAll(".slide");
          if (s.length < 2) return;
          s[slideIdx].classList.remove("active");
          slideIdx = (slideIdx + 1) % s.length;
          s[slideIdx].classList.add("active");
        }, 5000);
      }

      window.onload = initHome;
    </script>
  </body>
</html>
