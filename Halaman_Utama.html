<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeminiAnime - Streaming</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css"
    />
    <style>
      :root {
        --primary: #8a2be2;
        --secondary: #4b0082;
        --dark: #0a0a12;
        --card-bg: #16162a;
        --text: #ffffff;
        --glass: rgba(255, 255, 255, 0.05);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      body {
        background-color: var(--dark);
        color: var(--text);
        overflow-x: hidden;
      }

      /* Navbar */
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 5%;
        background: rgba(10, 10, 18, 0.95);
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 1000;
        border-bottom: 1px solid var(--glass);
      }
      .logo {
        font-size: 24px;
        font-weight: bold;
        color: var(--primary);
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .nav-links {
        display: flex;
        list-style: none;
        gap: 25px;
      }
      .nav-item {
        cursor: pointer;
        font-weight: 500;
        transition: 0.3s;
        color: #ccc;
      }
      .nav-item:hover,
      .nav-item.active {
        color: var(--primary);
      }
      .search-box {
        background: var(--glass);
        border: 1px solid #333;
        padding: 8px 15px;
        border-radius: 20px;
        display: flex;
        align-items: center;
      }
      .search-box input {
        background: none;
        border: none;
        color: white;
        outline: none;
        margin-left: 10px;
        width: 150px;
      }

      /* Container */
      .container {
        padding: 100px 5% 50px;
      }
      .page {
        display: none;
      }
      .page.active {
        display: block;
      }

      /* Hero Slider */
      #hero-slider {
        height: 450px;
        border-radius: 20px;
        overflow: hidden;
        position: relative;
        margin-bottom: 40px;
      }
      .slide {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        display: none;
        align-items: center;
        padding: 0 8%;
      }
      .slide.active {
        display: flex;
        animation: fadeIn 0.8s ease;
      }
      .slide::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to right, rgba(0, 0, 0, 0.9), transparent);
      }
      .hero-content {
        position: relative;
        max-width: 600px;
        z-index: 2;
      }
      .btn-play {
        background: var(--primary);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 30px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 20px;
      }

      /* Anime Card Style - PERSIS GAMBAR */
      .anime-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 25px;
      }
      .anime-card {
        cursor: pointer;
        transition: 0.4s ease;
        position: relative;
      }
      .anime-card:hover {
        transform: translateY(-10px);
      }

      .card-image-wrapper {
        position: relative;
        width: 100%;
        aspect-ratio: 2/3;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
      }
      .card-image-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Badges */
      .badge-hot {
        position: absolute;
        top: 10px;
        left: 10px;
        background: #ff3e3e;
        color: white;
        padding: 3px 10px;
        border-radius: 5px;
        font-size: 10px;
        font-weight: bold;
      }
      .badge-ongoing {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #2b6eff;
        color: white;
        padding: 3px 10px;
        border-radius: 5px;
        font-size: 10px;
        font-weight: bold;
      }
      .badge-rating {
        position: absolute;
        top: 40px;
        left: 10px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(5px);
        color: #ffc107;
        padding: 2px 8px;
        border-radius: 5px;
        font-size: 11px;
      }

      /* Overlay Episode */
      .ep-overlay {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(26, 26, 46, 0.85);
        backdrop-filter: blur(8px);
        color: white;
        padding: 8px 0;
        border-radius: 10px;
        width: 85%;
        text-align: center;
        font-weight: 600;
        font-size: 13px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .card-info {
        padding: 12px 5px;
      }
      .card-info h3 {
        font-size: 14px;
        text-transform: uppercase;
        color: white;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
        font-size: 12px;
        color: #888;
      }

      /* Detail Page */
      .player-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 30px;
      }
      .video-wrapper {
        width: 100%;
        aspect-ratio: 16/9;
        background: black;
        border-radius: 15px;
        overflow: hidden;
      }
      .video-wrapper iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .ep-list {
        display: grid;
        gap: 10px;
        margin-top: 15px;
        max-height: 400px;
        overflow-y: auto;
      }
      .ep-item {
        background: var(--glass);
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
        border: 1px solid transparent;
      }
      .ep-item:hover {
        background: var(--primary);
        border-color: white;
      }

      /* Loader */
      #loader {
        position: fixed;
        inset: 0;
        background: var(--dark);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="loader">MEMUAT DATA...</div>

    <nav>
      <div class="logo">Ani<span>ger</span></div>
      <ul class="nav-links">
        <li class="nav-item active" onclick="initHome()">Home</li>
        <li
          class="nav-item"
          onclick="loadCategory('POPULARITY_DESC', 'Paling Populer')"
        >
          Populer
        </li>
        <li class="nav-item" onclick="loadSchedule()">Jadwal</li>
      </ul>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input
          type="text"
          placeholder="Cari anime..."
          onkeypress="handleSearch(event)"
        />
      </div>
    </nav>

    <div class="container">
      <div id="home-page" class="page active">
        <div id="hero-slider"></div>
        <h2
          style="
            margin-bottom: 25px;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
          "
        >
          UPDATE EPISODE TERBARU
        </h2>
        <div id="trending-list" class="anime-grid"></div>
      </div>

      <div id="category-page" class="page">
        <h2
          id="category-title"
          style="
            margin-bottom: 25px;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
          "
        >
          Kategori
        </h2>
        <div id="category-list" class="anime-grid"></div>
      </div>

      <div id="detail-page" class="page">
        <button
          onclick="showPage('home-page')"
          style="
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
          "
        >
          <i class="fas fa-arrow-left"></i> Kembali
        </button>
        <div id="detail-content"></div>
      </div>
    </div>

    <script>
      const API_URL = "https://graphql.anilist.co";

      function showPage(pageId) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById(pageId).classList.add("active");
        window.scrollTo(0, 0);

        document.querySelectorAll(".nav-item").forEach((nav) => {
          nav.classList.remove("active");
          if (pageId === "home-page" && nav.innerText === "Home")
            nav.classList.add("active");
        });
      }

      function toggleLoader(show) {
        document.getElementById("loader").style.display = show
          ? "flex"
          : "none";
      }

      async function translateText(text) {
        if (!text) return "Sinopsis tidak tersedia.";
        const cleanText = text.replace(/<\/?[^>]+(>|$)/g, "");
        try {
          const res = await fetch(
            `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=id&dt=t&q=${encodeURI(cleanText)}`,
          );
          const json = await res.json();
          return json[0].map((item) => item[0]).join("");
        } catch (e) {
          return cleanText;
        }
      }

      // INIT HOME
      async function initHome() {
        toggleLoader(true);
        showPage("home-page");
        const query = `query { 
                slider: Page(perPage: 5) { media(type: ANIME, sort: TRENDING_DESC) { id title { romaji } description bannerImage coverImage { extraLarge } } }
                recent: Page(perPage: 12) { airingSchedules(airingAt_lesser: ${Math.floor(Date.now() / 1000)}, sort: TIME_DESC) { episode media { id title { romaji } averageScore coverImage { large } } } }
            }`;

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query }),
          });
          const json = await res.json();
          const data = json.data;

          // Render Slider
          document.getElementById("hero-slider").innerHTML = data.slider.media
            .map(
              (a, i) => `
                    <div class="slide ${i === 0 ? "active" : ""}" style="background-image: url('${a.bannerImage || a.coverImage.extraLarge}')">
                        <div class="hero-content">
                            <h1>${a.title.romaji}</h1>
                            <p style="margin: 15px 0; color: #ccc;">${a.description ? a.description.substring(0, 120).replace(/<\/?[^>]+(>|$)/g, "") : "Tonton Sekarang"}...</p>
                            <button class="btn-play" onclick="loadDetail(${a.id})"><i class="fas fa-play"></i> Tonton Sekarang</button>
                        </div>
                    </div>
                `,
            )
            .join("");

          // Render List - PREMIUM CARD STYLE
          document.getElementById("trending-list").innerHTML =
            data.recent.airingSchedules
              .map(
                (item) => `
                    <div class="anime-card" onclick="loadDetail(${item.media.id})">
                        <div class="card-image-wrapper">
                            <img src="${item.media.coverImage.large}">
                            <div class="badge-hot">HOT</div>
                            <div class="badge-ongoing">ONGOING</div>
                            <div class="badge-rating"><i class="fas fa-star"></i> ${item.media.averageScore ? (item.media.averageScore / 10).toFixed(1) : "7.5"}</div>
                            <div class="ep-overlay">Eps. ${item.episode}</div>
                        </div>
                        <div class="card-info">
                            <h3>${item.media.title.romaji}</h3>
                            <div class="card-meta">
                                <span><i class="far fa-clock"></i> 1 jam lalu</span>
                                <span style="color: #2b6eff"><i class="fas fa-circle" style="font-size: 8px"></i></span>
                            </div>
                        </div>
                    </div>
                `,
              )
              .join("");

          startAutoSlide();
        } catch (e) {
          console.error(e);
        } finally {
          toggleLoader(false);
        }
      }

      // LOAD POPULER
      async function loadCategory(sort, title) {
        toggleLoader(true);
        const query = `query($s:[MediaSort]){ Page(perPage:18){ media(type:ANIME, sort:$s){ id title{romaji} averageScore coverImage{large} } } }`;
        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, variables: { s: [sort] } }),
          });
          const json = await res.json();
          renderCategory(title, json.data.Page.media);
        } catch (e) {
          console.error(e);
        }
      }

      // LOAD JADWAL
      async function loadSchedule() {
        toggleLoader(true);
        const query = `query{ Page(perPage:18){ airingSchedules(airingAt_greater:${Math.floor(Date.now() / 1000)}, sort:TIME){ media{ id title{romaji} averageScore coverImage{large} } episode } } }`;
        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query }),
          });
          const json = await res.json();
          const list = json.data.Page.airingSchedules.map((i) => ({
            ...i.media,
            episode: i.episode,
          }));
          renderCategory("Jadwal Rilis", list);
        } catch (e) {
          console.error(e);
        }
      }

      function renderCategory(title, data) {
        document.getElementById("category-title").innerText = title;
        document.getElementById("category-list").innerHTML = data
          .map(
            (a) => `
                <div class="anime-card" onclick="loadDetail(${a.id})">
                    <div class="card-image-wrapper">
                        <img src="${a.coverImage.large}">
                        <div class="badge-rating"><i class="fas fa-star"></i> ${(a.averageScore / 10).toFixed(1)}</div>
                        ${a.episode ? `<div class="ep-overlay">Eps. ${a.episode}</div>` : ""}
                    </div>
                    <div class="card-info"><h3>${a.title.romaji}</h3></div>
                </div>
            `,
          )
          .join("");
        showPage("category-page");
        toggleLoader(false);
      }

      // DETAIL PAGE
      async function loadDetail(id) {
        toggleLoader(true);
        const query = `query($id:Int){ Media(id:$id){ title{romaji} description genres episodes averageScore recommendations(perPage:6){ nodes{ mediaRecommendation{ id title{romaji} coverImage{large} } } } } }`;
        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, variables: { id } }),
          });
          const json = await res.json();
          const a = json.data.Media;
          const sinopsisIndo = await translateText(a.description);

          document.getElementById("detail-content").innerHTML = `
                    <div class="player-grid">
                        <div>
                            <div class="video-wrapper">
                                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                            </div>
                            <div style="margin-top:25px">
                                <h1 style="font-size:28px">${a.title.romaji}</h1>
                                <div style="margin:15px 0">
                                    <span style="color:#ffc107; margin-right:15px"><i class="fas fa-star"></i> ${(a.averageScore / 10).toFixed(1)} Rating</span>
                                    ${a.genres.map((g) => `<span style="background:var(--primary); font-size:11px; padding:4px 12px; border-radius:20px; margin-right:8px">${g}</span>`).join("")}
                                </div>
                                <p style="color:#bbb; line-height:1.8; background:var(--glass); padding:20px; border-radius:12px;">${sinopsisIndo}</p>
                            </div>
                        </div>
                        <div class="episodes-box">
                            <h3 style="border-bottom: 2px solid var(--primary); padding-bottom:10px">Daftar Episode</h3>
                            <div class="ep-list">
                                ${Array.from({ length: a.episodes || 12 }, (_, i) => `<div class="ep-item">Episode ${i + 1} <i class="fas fa-play-circle" style="float:right"></i></div>`).join("")}
                            </div>
                        </div>
                    </div>
                `;
          showPage("detail-page");
        } catch (e) {
          console.error(e);
        } finally {
          toggleLoader(false);
        }
      }

      // SEARCH
      async function handleSearch(e) {
        if (e.key === "Enter") {
          toggleLoader(true);
          const s = e.target.value;
          const query = `query($s:String){ Page(perPage:18){ media(search:$s, type:ANIME){ id title{romaji} averageScore coverImage{large} } } }`;
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, variables: { s } }),
          });
          const json = await res.json();
          renderCategory(`Hasil Cari: ${s}`, json.data.Page.media);
        }
      }

      // AUTO SLIDE
      let slideIdx = 0;
      function startAutoSlide() {
        setInterval(() => {
          const slides = document.querySelectorAll(".slide");
          if (slides.length < 2) return;
          slides[slideIdx].classList.remove("active");
          slideIdx = (slideIdx + 1) % slides.length;
          slides[slideIdx].classList.add("active");
        }, 6000);
      }

      window.onload = initHome;
    </script>
  </body>
</html>
