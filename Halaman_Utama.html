<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeVerse | Streaming & Community</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <style>
      :root {
        --primary: #8a2be2;
        --secondary: #4b0082;
        --dark: #0a0a12;
        --card-bg: #16162a;
        --text: #ffffff;
        --glass: rgba(255, 255, 255, 0.05);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }
      body {
        background-color: var(--dark);
        color: var(--text);
        overflow-x: hidden;
      }

      /* Navbar */
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 8%;
        background: rgba(10, 10, 18, 0.95);
        backdrop-filter: blur(10px);
        position: sticky;
        top: 0;
        z-index: 1000;
        border-bottom: 1px solid var(--glass);
      }
      .logo {
        font-size: 24px;
        font-weight: 600;
        cursor: pointer;
        color: white;
        text-decoration: none;
      }
      .logo span {
        color: var(--primary);
      }
      .nav-links {
        display: flex;
        gap: 25px;
        list-style: none;
      }
      .nav-links a {
        text-decoration: none;
        color: #ccc;
        transition: 0.3s;
        font-size: 14px;
        cursor: pointer;
      }
      .nav-links a:hover {
        color: var(--primary);
      }

      .search-bar input {
        padding: 8px 18px;
        border-radius: 20px;
        border: 1px solid var(--glass);
        background: #1f1f3d;
        color: white;
        outline: none;
      }

      /* Hero Slider */
      .hero-slider {
        position: relative;
        height: 500px;
        width: 100%;
        overflow: hidden;
      }
      .slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: 0.8s ease;
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        padding: 0 8%;
      }
      .slide.active {
        opacity: 1;
        z-index: 1;
      }
      .slide::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(to right, #0a0a12 10%, transparent 100%);
      }
      .hero-content {
        position: relative;
        z-index: 2;
        max-width: 600px;
      }
      .hero-content h1 {
        font-size: 36px;
        margin-bottom: 10px;
      }
      .hero-content p {
        color: #ccc;
        font-size: 13px;
        margin-bottom: 20px;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* Grid */
      .container {
        padding: 40px 8%;
      }
      .section-title {
        margin-bottom: 25px;
        border-left: 4px solid var(--primary);
        padding-left: 15px;
        font-size: 22px;
      }
      .anime-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
      }
      .anime-card {
        background: var(--card-bg);
        border-radius: 12px;
        overflow: hidden;
        transition: 0.3s;
        cursor: pointer;
        border: 1px solid var(--glass);
      }
      .anime-card:hover {
        transform: translateY(-5px);
        border-color: var(--primary);
      }
      .anime-card img {
        width: 100%;
        height: 250px;
        object-fit: cover;
      }
      .card-info {
        padding: 12px;
      }
      .card-info h3 {
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* MODAL DETAIL (Halaman Putar) */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 2000;
        display: none;
        overflow-y: auto;
        padding: 40px 8%;
      }
      .modal.active {
        display: block;
      }
      .close-modal {
        position: fixed;
        top: 20px;
        right: 40px;
        font-size: 30px;
        cursor: pointer;
        z-index: 2001;
      }

      .player-section {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 30px;
      }
      .video-box {
        width: 100%;
        aspect-ratio: 16/9;
        background: #000;
        border-radius: 15px;
        overflow: hidden;
        border: 1px solid var(--glass);
      }
      .video-box iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      .info-box h2 {
        margin-bottom: 15px;
        color: var(--primary);
      }
      .info-box p {
        font-size: 14px;
        color: #bbb;
        line-height: 1.6;
        margin-bottom: 20px;
      }

      .episode-list {
        background: #16162a;
        border-radius: 10px;
        padding: 15px;
        height: 300px;
        overflow-y: auto;
      }
      .ep-item {
        padding: 10px;
        border-bottom: 1px solid var(--glass);
        cursor: pointer;
        transition: 0.2s;
        font-size: 14px;
      }
      .ep-item:hover {
        background: var(--primary);
        color: white;
      }

      .recommendation-section {
        margin-top: 50px;
      }

      .btn {
        padding: 10px 25px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
      }
      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .slider-dots {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        gap: 8px;
      }
      .dot {
        width: 10px;
        height: 10px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        cursor: pointer;
      }
      .dot.active {
        background: var(--primary);
        width: 25px;
        border-radius: 5px;
      }

      @media (max-width: 900px) {
        .player-section {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a class="logo" href="/">Anime<span>Verse</span></a>
      <ul class="nav-links">
        <li><a onclick="fetchAnime('TRENDING_DESC', 'Beranda')">Home</a></li>
        <li>
          <a onclick="fetchAnime('POPULARITY_DESC', 'Populer')">Populer</a>
        </li>
        <li><a onclick="fetchSchedule()">Jadwal</a></li>
      </ul>
      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="Cari anime..."
          onkeypress="handleSearch(event)"
        />
      </div>
    </nav>

    <header class="hero-slider" id="hero-slider"></header>

    <main class="container">
      <h2 class="section-title" id="content-title">Sedang Tren</h2>
      <div class="anime-grid" id="anime-list"></div>
    </main>

    <div id="video-modal" class="modal">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <div id="modal-content"></div>
    </div>

    <script>
      const API_URL = "https://graphql.anilist.co";

      // 1. Setup Slider
      async function setupSlider() {
        const query = `query { Page(perPage: 5) { media(type: ANIME, sort: TRENDING_DESC) { id title { romaji } description bannerImage coverImage { extraLarge } } } }`;
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query }),
        });
        const json = await res.json();
        const slider = document.getElementById("hero-slider");

        json.data.Page.media.forEach((anime, i) => {
          const div = document.createElement("div");
          div.className = `slide ${i === 0 ? "active" : ""}`;
          div.style.backgroundImage = `url('${anime.bannerImage || anime.coverImage.extraLarge}')`;
          div.innerHTML = `<div class="hero-content"><h1>${anime.title.romaji}</h1><p>${anime.description}</p><button class="btn btn-primary" onclick="openModal(${anime.id})">Tonton Sekarang</button></div>`;
          slider.appendChild(div);
        });
        startAutoSlide();
      }

      // 2. Fetch List Anime
      async function fetchAnime(sort, title) {
        document.getElementById("content-title").innerText = title;
        const query = `query($s:[MediaSort]){ Page(perPage:12){ media(type:ANIME, sort:$s){ id title{romaji} coverImage{large} } } }`;
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query, variables: { s: [sort] } }),
        });
        const json = await res.json();
        displayAnime(json.data.Page.media);
      }

      function displayAnime(list) {
        const container = document.getElementById("anime-list");
        container.innerHTML = list
          .map(
            (a) => `
          <div class="anime-card" onclick="openModal(${a.id})">
            <img src="${a.coverImage.large}">
            <div class="card-info"><h3>${a.title.romaji}</h3></div>
          </div>
        `,
          )
          .join("");
      }

      // 3. MODAL LOGIC (Halaman Putar)
      async function openModal(id) {
        const modal = document.getElementById("video-modal");
        const content = document.getElementById("modal-content");
        modal.classList.add("active");
        content.innerHTML = "<h2>Memuat Detail...</h2>";

        const query = `query($id:Int){
          Media(id:$id){
            title{romaji}
            description
            bannerImage
            episodes
            genres
            recommendations(perPage:6){ nodes{ mediaRecommendation{ id title{romaji} coverImage{large} } } }
          }
        }`;

        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query, variables: { id } }),
        });
        const json = await res.json();
        const anime = json.data.Media;

        content.innerHTML = `
          <div class="player-section">
            <div class="video-area">
              <div class="video-box">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
              </div>
              <div class="info-box" style="margin-top:20px">
                <h2>${anime.title.romaji}</h2>
                <p>${anime.description}</p>
                <div style="display:flex; gap:10px; flex-wrap:wrap">
                  ${anime.genres.map((g) => `<span style="background:var(--primary); padding:3px 10px; border-radius:15px; font-size:12px">${g}</span>`).join("")}
                </div>
              </div>
            </div>
            <div class="playlist-area">
              <h3>Daftar Episode</h3>
              <div class="episode-list">
                ${Array.from({ length: anime.episodes || 12 }, (_, i) => `<div class="ep-item">Episode ${i + 1}</div>`).join("")}
              </div>
            </div>
          </div>

          <div class="recommendation-section">
            <h2 class="section-title">Rekomendasi Serupa</h2>
            <div class="anime-grid">
              ${anime.recommendations.nodes
                .map((r) => {
                  const rec = r.mediaRecommendation;
                  return `
                  <div class="anime-card" onclick="openModal(${rec.id})">
                    <img src="${rec.coverImage.large}">
                    <div class="card-info"><h3>${rec.title.romaji}</h3></div>
                  </div>
                `;
                })
                .join("")}
            </div>
          </div>
        `;
      }

      function closeModal() {
        document.getElementById("video-modal").classList.remove("active");
      }

      // Slider Logic
      let slideIdx = 0;
      function startAutoSlide() {
        setInterval(() => {
          const slides = document.querySelectorAll(".slide");
          if (slides.length === 0) return;
          slides[slideIdx].classList.remove("active");
          slideIdx = (slideIdx + 1) % slides.length;
          slides[slideIdx].classList.add("active");
        }, 5000);
      }

      // Search & Others
      async function handleSearch(e) {
        if (e.key === "Enter") {
          const s = e.target.value;
          const query = `query($s:String){ Page(perPage:12){ media(search:$s, type:ANIME){ id title{romaji} coverImage{large} } } }`;
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, variables: { s } }),
          });
          const json = await res.json();
          displayAnime(json.data.Page.media);
        }
      }

      window.onload = () => {
        setupSlider();
        fetchAnime("TRENDING_DESC", "Sedang Tren");
      };
    </script>
  </body>
</html>
